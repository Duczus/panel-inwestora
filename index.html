<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Inwestora</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:20px;
border-radius:10px;
font-size:18px;
}

.big{
font-size:26px;
margin-top:10px;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
background:#2e7df6;
border:none;
border-radius:10px;
color:white;
}

</style>

</head>

<body>

<h1>Panel Inwestora</h1>

<div class="grid">

<div class="card">
BTC
<div id="btc" class="big">...</div>
</div>

<div class="card">
ETH
<div id="eth" class="big">...</div>
</div>

<div class="card">
GOLD
<div id="gold" class="big">...</div>
</div>

<div class="card">
MARKET FEAR
<div id="fear" class="big">...</div>
</div>

</div>

<button onclick="load()">Odśwież dane</button>

<script>

async function load(){

// BTC + ETH + GOLD z CoinGecko
let r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether-gold&vs_currencies=usd")
let data = await r.json()

document.getElementById("btc").innerText = data.bitcoin.usd + " USD"
document.getElementById("eth").innerText = data.ethereum.usd + " USD"
document.getElementById("gold").innerText = data["tether-gold"].usd + " USD"


// Fear & Greed
let f = await fetch("https://api.alternative.me/fng/")
let fear = await f.json()

document.getElementById("fear").innerText = fear.data[0].value

}

load()

</script>

</body>
</html>
